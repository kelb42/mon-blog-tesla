ame: Nouvel article hebdomadaire

on:
  schedule:
    # Tous les lundis à 8h00 UTC (9h00 heure de Paris en hiver, 10h en été)
    - cron: "0 8 * * 1"
  workflow_dispatch: {}  # permet aussi de le lancer manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Générer l'article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_article.py

      - name: Commit et push
        run: |
          git config user.name "volt-et-route-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html used_topics.json
          git diff --cached --quiet || git commit -m "Nouvel article automatique du $(date +'%d/%m/%Y')"
          git push
